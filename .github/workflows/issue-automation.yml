name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    outputs:
      is-bug: ${{ steps.categorize.outputs.is-bug }}
      is-epic: ${{ steps.categorize.outputs.is-epic }}
      is-maintenance: ${{ steps.categorize.outputs.is-maintenance }}
      priority: ${{ steps.prioritize.outputs.priority }}
      issue-number: ${{ github.event.issue.number }}
    steps:
      - name: Create Labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: "Something isn't working" },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '5319e7', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fbca04', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'e4e669', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'c5def5', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'fbca04', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '7057ff', description: 'Issue created by first-time contributor' }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (e) {
                if (e.status === 422) {
                  try {
                    await github.rest.issues.updateLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description
                    });
                  } catch (updateErr) {
                    console.log('Label ' + label.name + ' already exists');
                  }
                }
              }
            }

      - name: Categorize Issue
        id: categorize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const isBug = title.includes('bug');
            const isEpic = title.includes('epic');
            const isMaintenance = title.includes('maintenance');
            core.setOutput('is-bug', isBug.toString());
            core.setOutput('is-epic', isEpic.toString());
            core.setOutput('is-maintenance', isMaintenance.toString());

      - name: Determine Priority
        id: prioritize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            let priority = 'priority-medium';
            if (text.match(/\b(low|nice-to-have|minor)\b/)) {
              priority = 'priority-low';
            }
            if (text.match(/\b(medium|normal)\b/)) {
              priority = 'priority-medium';
            }
            if (text.match(/\b(important|high|blocking)\b/)) {
              priority = 'priority-high';
            }
            if (text.match(/\b(critical|urgent|production|outage)\b/)) {
              priority = 'priority-critical';
            }
            core.setOutput('priority', priority);

      - name: Apply Labels
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            const labelsToAdd = ['needs-triage'];
            if (title.includes('bug')) labelsToAdd.push('bug');
            if (title.includes('epic')) labelsToAdd.push('epic');
            if (title.includes('maintenance')) labelsToAdd.push('maintenance');
            let priority = 'priority-medium';
            if (text.match(/\b(low|nice-to-have|minor)\b/)) {
              priority = 'priority-low';
            }
            if (text.match(/\b(medium|normal)\b/)) {
              priority = 'priority-medium';
            }
            if (text.match(/\b(important|high|blocking)\b/)) {
              priority = 'priority-high';
            }
            if (text.match(/\b(critical|urgent|production|outage)\b/)) {
              priority = 'priority-critical';
            }
            labelsToAdd.push(priority);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labelsToAdd
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: needs.issue-triage.outputs.is-epic == 'true'
    steps:
      - name: Create Sub-Issues for Epic
        uses: actions/github-script@v7
        with:
          script: |
            const parentNumber = context.payload.issue.number;
            const parentTitle = context.payload.issue.title;
            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];
            const subIssueNumbers = [];
            for (let i = 0; i < tasks.length; i++) {
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${tasks[i]}`;
              const subBody = `Related to #${parentNumber}

This is sub-task ${i + 1} of the epic: **${parentTitle}**

## Task: ${tasks[i]}

Please complete this task as part of the parent epic.`;
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });
              subIssueNumbers.push(subIssue.data.number);
            }
            let checklist = '## Epic Tasks

';
            for (let i = 0; i < tasks.length; i++) {
              checklist += `- [ ] #${subIssueNumbers[i]} - Task ${i + 1}: ${tasks[i]}
`;
            }
            const currentBody = context.payload.issue.body || '';
            const updatedBody = currentBody + '

' + checklist;
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: always() && needs.issue-triage.result == 'success'
    steps:
      - name: Check First Time Contributor and Respond
        uses: actions/github-script@v7
        with:
          script: |
            const issueAuthor = context.payload.issue.user.login;
            const issueNumber = context.payload.issue.number;
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;

            // Check if first-time contributor in this repo
            let isFirstTime = true;
            try {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                creator: issueAuthor,
                state: 'all',
                per_page: 100
              });
              const otherIssues = issues.data.filter(i => i.number !== issueNumber && !i.pull_request);
              if (otherIssues.length > 0) {
                isFirstTime = false;
              }
            } catch (e) {
              console.log('Error checking contributor history:', e.message);
            }

            if (isFirstTime) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '👋 Welcome! Thank you for creating your first issue in this repository. We appreciate your contribution and will review this shortly.'
              });
            }

            // Determine issue type and post appropriate response
            let responseBody = '';
            if (title.includes('bug')) {
              responseBody = `## Bug Report Guidelines

Thank you for reporting this bug. To help us resolve it quickly, please ensure you have provided:

- [ ] Steps to reproduce
- [ ] Expected behavior
- [ ] Actual behavior
- [ ] Environment details (OS, Node.js version, etc.)
- [ ] Screenshots or logs if applicable

Our team will investigate this issue and provide updates here.`;
            } else if (title.includes('epic')) {
              responseBody = `## Feature Request Process

Thank you for submitting this epic/feature request. Here's our process:

1. **Review** - The team will review the proposal
2. **Discussion** - We'll discuss scope and requirements
3. **Breakdown** - Sub-tasks will be created for implementation
4. **Implementation** - Work begins on approved tasks

Please ensure you have described the use case and expected outcomes clearly.`;
            } else if (title.includes('maintenance')) {
              responseBody = `## Maintenance Guidelines

Thank you for flagging this maintenance item. Our guidelines:

- Clearly describe what needs to be maintained/updated
- Identify any dependencies or blockers
- Suggest a timeline if applicable
- Note any risks or considerations

The maintenance team will review and schedule this appropriately.`;
            } else {
              responseBody = `## Issue Received

Thank you for creating this issue. Our team will review it shortly and assign appropriate priority and resources.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: responseBody
            });

            // Set milestone for high/critical priority issues
            let priority = 'priority-medium';
            if (text.match(/\b(low|nice-to-have|minor)\b/)) priority = 'priority-low';
            if (text.match(/\b(medium|normal)\b/)) priority = 'priority-medium';
            if (text.match(/\b(important|high|blocking)\b/)) priority = 'priority-high';
            if (text.match(/\b(critical|urgent|production|outage)\b/)) priority = 'priority-critical';

            if (priority === 'priority-high' || priority === 'priority-critical') {
              try {
                let milestone;
                const milestones = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                });
                milestone = milestones.data.find(m => m.title === 'v1.0.0');
                if (!milestone) {
                  const created = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 release milestone'
                  });
                  milestone = created.data;
                }
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  milestone: milestone.number
                });
              } catch (e) {
                console.log('Error setting milestone:', e.message);
              }
            }

            // Change status from needs-triage to needs-review
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'needs-triage'
              });
            } catch (e) {
              console.log('Could not remove needs-triage label:', e.message);
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-review']
            });
