name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    outputs:
      category: ${{ steps.categorize.outputs.category }}
      priority: ${{ steps.prioritize.outputs.priority }}
      is_epic: ${{ steps.categorize.outputs.is_epic }}
    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '5319e7', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fbca04', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'e4e669', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'c5def5', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'fbca04', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '7057ff', description: 'Issue created by first-time contributor' }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  try {
                    await github.rest.issues.updateLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description
                    });
                    console.log(`Updated label: ${label.name}`);
                  } catch (updateErr) {
                    console.log(`Label ${label.name} already exists`);
                  }
                }
              }
            }

      - name: Categorize issue
        id: categorize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            let category = '';
            let isEpic = 'false';
            if (title.includes('bug')) {
              category = 'bug';
            } else if (title.includes('epic')) {
              category = 'epic';
              isEpic = 'true';
            } else if (title.includes('maintenance')) {
              category = 'maintenance';
            }
            core.setOutput('category', category);
            core.setOutput('is_epic', isEpic);
            console.log(`Category: ${category}, Is Epic: ${isEpic}`);

      - name: Determine priority
        id: prioritize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            let priority = 'priority-medium';
            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const highKeywords = ['important', 'high', 'blocking'];
            const mediumKeywords = ['medium', 'normal'];
            const lowKeywords = ['low', 'nice-to-have', 'minor'];
            if (criticalKeywords.some(kw => text.includes(kw))) {
              priority = 'priority-critical';
            } else if (highKeywords.some(kw => text.includes(kw))) {
              priority = 'priority-high';
            } else if (mediumKeywords.some(kw => text.includes(kw))) {
              priority = 'priority-medium';
            } else if (lowKeywords.some(kw => text.includes(kw))) {
              priority = 'priority-low';
            }
            core.setOutput('priority', priority);
            console.log(`Priority: ${priority}`);

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const category = '${{ steps.categorize.outputs.category }}';
            const priority = '${{ steps.prioritize.outputs.priority }}';
            const labelsToAdd = ['needs-triage'];
            if (category) {
              labelsToAdd.push(category);
            }
            labelsToAdd.push(priority);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labelsToAdd
            });
            console.log(`Applied labels: ${labelsToAdd.join(', ')}`);

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: needs.issue-triage.outputs.is_epic == 'true'
    steps:
      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          script: |
            const parentNumber = context.payload.issue.number;
            const parentTitle = context.payload.issue.title;
            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];
            const subIssueNumbers = [];
            for (let i = 0; i < tasks.length; i++) {
              const taskTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${tasks[i]}`;
              const taskBody = `Related to #${parentNumber}\n\n## Task Description\nThis is sub-task ${i + 1} of the epic: ${parentTitle}\n\n### Objective\n${tasks[i]} for the parent epic.\n\n### Acceptance Criteria\n- [ ] Task completed\n- [ ] Review approved`;
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: taskTitle,
                body: taskBody,
                labels: ['enhancement', 'needs-review']
              });
              subIssueNumbers.push(issue.data.number);
              console.log(`Created sub-issue #${issue.data.number}: ${taskTitle}`);
            }
            let checklist = '## Epic Tasks\n\n';
            for (let i = 0; i < tasks.length; i++) {
              checklist += `- [ ] #${subIssueNumbers[i]} - Task ${i + 1}: ${tasks[i]}\n`;
            }
            const currentBody = context.payload.issue.body || '';
            const updatedBody = currentBody + '\n\n' + checklist;
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });
            console.log(`Updated parent issue #${parentNumber} with epic tasks checklist`);

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: always() && needs.issue-triage.result == 'success'
    steps:
      - name: Check first-time contributor
        id: check_first_time
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const issueNumber = context.payload.issue.number;
            let isFirstTime = true;
            try {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                creator: author,
                state: 'all',
                per_page: 10
              });
              const otherIssues = issues.data.filter(i => i.number !== issueNumber && !i.pull_request);
              if (otherIssues.length > 0) {
                isFirstTime = false;
              }
            } catch (e) {
              console.log(`Error checking issues: ${e.message}`);
            }
            core.setOutput('is_first_time', isFirstTime.toString());
            console.log(`Is first-time contributor: ${isFirstTime}`);

      - name: Welcome first-time contributor
        if: steps.check_first_time.outputs.is_first_time == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['first-time-contributor']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '## Welcome! \ud83c\udf89\n\nThank you for creating your first issue in this repository! We appreciate your contribution and will review this shortly.\n\nPlease make sure you have provided all the necessary information for us to help you effectively.'
            });
            console.log('Welcomed first-time contributor');

      - name: Post type-specific response
        uses: actions/github-script@v7
        with:
          script: |
            const category = '${{ needs.issue-triage.outputs.category }}';
            let responseBody = '';
            if (category === 'bug') {
              responseBody = `## Bug Report Guidelines\n\nThank you for reporting this bug! To help us resolve it quickly, please ensure:\n\n1. **Steps to Reproduce**: Provide clear, numbered steps\n2. **Expected vs Actual**: Describe what should happen vs what does happen\n3. **Environment**: Include OS, Node.js version, browser info\n4. **Screenshots/Logs**: Attach any relevant error messages or screenshots\n\nOur team will investigate this issue and provide updates. Thank you for helping improve the project!`;
            } else if (category === 'epic') {
              responseBody = `## Feature Request Process\n\nThank you for submitting this epic! Here's our feature request process:\n\n1. **Review**: Our team will review the requirements\n2. **Design**: Architecture and design discussions\n3. **Breakdown**: The epic has been broken into sub-tasks\n4. **Implementation**: Development and code review\n5. **Testing**: QA and documentation\n\nSub-tasks have been automatically created for this epic. Track progress in the checklist above.`;
            } else if (category === 'maintenance') {
              responseBody = `## Maintenance Guidelines\n\nThank you for identifying this maintenance task! Here are our guidelines:\n\n1. **Scope**: Clearly define what needs to be maintained\n2. **Impact**: Assess the impact on existing functionality\n3. **Timeline**: Provide estimated time for completion\n4. **Testing**: Ensure all changes are properly tested\n\nOur team will prioritize this task based on its urgency and impact.`;
            } else {
              responseBody = `## Issue Received\n\nThank you for creating this issue! Our team will review it shortly and provide updates.\n\nPlease ensure you have provided sufficient details for us to understand and address your request.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: responseBody
            });
            console.log(`Posted ${category || 'general'} response`);

      - name: Set milestone for high priority issues
        uses: actions/github-script@v7
        with:
          script: |
            const priority = '${{ needs.issue-triage.outputs.priority }}';
            if (priority === 'priority-high' || priority === 'priority-critical') {
              let milestone = null;
              try {
                const milestones = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                });
                milestone = milestones.data.find(m => m.title === 'v1.0.0');
                if (!milestone) {
                  const created = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 release milestone'
                  });
                  milestone = created.data;
                  console.log('Created milestone v1.0.0');
                }
              } catch (e) {
                console.log(`Error with milestone: ${e.message}`);
                try {
                  const created = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 release milestone'
                  });
                  milestone = created.data;
                } catch (e2) {
                  console.log(`Could not create milestone: ${e2.message}`);
                }
              }
              if (milestone) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  milestone: milestone.number
                });
                console.log(`Set milestone v1.0.0 for issue #${context.payload.issue.number}`);
              }
            }

      - name: Update status label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'needs-triage'
              });
            } catch (e) {
              console.log(`Could not remove needs-triage label: ${e.message}`);
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['needs-review']
            });
            console.log('Updated status: needs-triage -> needs-review');
