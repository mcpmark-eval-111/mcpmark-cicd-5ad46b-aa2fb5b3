name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    outputs:
      category: ${{ steps.categorize.outputs.category }}
      priority: ${{ steps.prioritize.outputs.priority }}
      issue_number: ${{ github.event.issue.number }}
    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '7057ff', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fbca04', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'e4e669', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'c5def5', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'fbca04', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '7057ff', description: 'Issue created by first-time contributor' }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  try {
                    await github.rest.issues.updateLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description
                    });
                    console.log(`Updated label: ${label.name}`);
                  } catch (updateErr) {
                    console.log(`Label ${label.name} already exists`);
                  }
                }
              }
            }

      - name: Categorize issue
        id: categorize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            let category = '';
            if (title.includes('bug')) {
              category = 'bug';
            } else if (title.includes('epic')) {
              category = 'epic';
            } else if (title.includes('maintenance')) {
              category = 'maintenance';
            }
            core.setOutput('category', category);
            console.log(`Category detected: ${category || 'none'}`);

      - name: Determine priority
        id: prioritize
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            let priority = '';
            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const highKeywords = ['important', 'high', 'blocking'];
            const mediumKeywords = ['medium', 'normal'];
            const lowKeywords = ['low', 'nice-to-have', 'minor'];
            if (criticalKeywords.some(k => text.includes(k))) {
              priority = 'priority-critical';
            } else if (highKeywords.some(k => text.includes(k))) {
              priority = 'priority-high';
            } else if (lowKeywords.some(k => text.includes(k))) {
              priority = 'priority-low';
            } else {
              priority = 'priority-medium';
            }
            core.setOutput('priority', priority);
            console.log(`Priority detected: ${priority}`);

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const category = '${{ steps.categorize.outputs.category }}';
            const priority = '${{ steps.prioritize.outputs.priority }}';
            const labelsToAdd = ['needs-triage'];
            if (category) {
              labelsToAdd.push(category);
            }
            if (priority) {
              labelsToAdd.push(priority);
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labelsToAdd
            });
            console.log(`Applied labels: ${labelsToAdd.join(', ')}`);

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event.action == 'opened' && contains(github.event.issue.title, 'Epic') || contains(github.event.issue.title, 'epic')
    steps:
      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          script: |
            const parentNumber = context.payload.issue.number;
            const parentTitle = context.payload.issue.title;
            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];
            // Ensure needed labels exist
            const neededLabels = ['enhancement', 'needs-review'];
            for (const labelName of neededLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName
                });
              } catch (e) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelName,
                    color: labelName === 'enhancement' ? 'a2eeef' : 'fbca04',
                    description: labelName === 'enhancement' ? 'New feature or request' : 'Awaiting review from maintainers'
                  });
                } catch (createErr) {
                  console.log(`Label ${labelName} handling: ${createErr.message}`);
                }
              }
            }
            const subIssueNumbers = [];
            for (let i = 0; i < tasks.length; i++) {
              const taskName = tasks[i];
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${taskName}`;
              const subBody = `Related to #${parentNumber}

This is sub-task ${i + 1} of the epic: **${parentTitle}**

## Objective
Complete the ${taskName} phase for this epic.

## Acceptance Criteria
- [ ] All ${taskName.toLowerCase()} deliverables completed
- [ ] Reviewed and approved by maintainers`;
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });
              subIssueNumbers.push(subIssue.data.number);
              console.log(`Created sub-issue #${subIssue.data.number}: ${subTitle}`);
            }
            // Update parent issue with checklist
            const checklist = subIssueNumbers.map((num, idx) => {
              return `- [ ] #${num} - Task ${idx + 1}: ${tasks[idx]}`;
            }).join('
');
            const currentBody = context.payload.issue.body || '';
            const updatedBody = `${currentBody}

## Epic Tasks
${checklist}`;
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });
            console.log(`Updated parent issue #${parentNumber} with epic tasks checklist`);

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event.action == 'opened'
    steps:
      - name: Check first-time contributor
        id: check-first-time
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const currentIssueNumber = context.payload.issue.number;
            let isFirstIssue = true;
            try {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                creator: author,
                state: 'all',
                per_page: 100
              });
              const previousIssues = issues.data.filter(i => i.number !== currentIssueNumber && !i.pull_request);
              if (previousIssues.length > 0) {
                isFirstIssue = false;
              }
            } catch (e) {
              console.log(`Error checking issues: ${e.message}`);
            }
            core.setOutput('is_first_time', isFirstIssue.toString());
            console.log(`Is first-time contributor: ${isFirstIssue}`);

      - name: Welcome first-time contributor
        if: steps.check-first-time.outputs.is_first_time == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['first-time-contributor']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## 🎉 Welcome!

Hi @${context.payload.issue.user.login}, welcome to the project! This appears to be your first issue here. Thank you for contributing!

Our team will review your issue shortly. In the meantime, please make sure you've provided all the necessary details.

We're glad to have you as part of our community!`
            });

      - name: Post type-specific response
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const category = '${{ needs.issue-triage.outputs.category }}';
            const priority = '${{ needs.issue-triage.outputs.priority }}';
            let responseBody = '';
            if (category === 'bug' || title.includes('bug')) {
              responseBody = `## 🐛 Bug Report Guidelines

Thank you for reporting this bug! To help us resolve it quickly, please ensure you've included:

- **Steps to reproduce** the issue
- **Expected behavior** vs **actual behavior**
- **Environment details** (OS, Node.js version, browser)
- **Screenshots or logs** if applicable

Our team will investigate this issue and provide an update soon.

---
*This is an automated response from the Issue Management system.*`;
            } else if (category === 'epic' || title.includes('epic')) {
              responseBody = `## 🚀 Feature Request Process

Thank you for submitting this epic feature request! Here's what happens next:

1. **Triage**: Our team will review and prioritize this request
2. **Task Breakdown**: Sub-tasks have been automatically created for tracking
3. **Design Review**: Architecture and design will be discussed
4. **Implementation**: Development will begin once approved

Please review the generated sub-tasks and provide any additional context needed.

---
*This is an automated response from the Issue Management system.*`;
            } else if (category === 'maintenance' || title.includes('maintenance')) {
              responseBody = `## 🔧 Maintenance Guidelines

Thank you for reporting this maintenance task! Here's our process:

- **Assessment**: We'll evaluate the scope and impact
- **Scheduling**: Maintenance tasks are scheduled during low-traffic periods
- **Testing**: All changes will be thoroughly tested before deployment
- **Communication**: Updates will be posted here as work progresses

Please ensure you've included the impact assessment and timeline suggestions.

---
*This is an automated response from the Issue Management system.*`;
            } else {
              responseBody = `## 📋 Issue Received

Thank you for creating this issue! Our team will review it shortly.

---
*This is an automated response from the Issue Management system.*`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: responseBody
            });

      - name: Set milestone for high priority issues
        uses: actions/github-script@v7
        with:
          script: |
            const priority = '${{ needs.issue-triage.outputs.priority }}';
            if (priority === 'priority-high' || priority === 'priority-critical') {
              // Find or create v1.0.0 milestone
              let milestoneNumber = null;
              try {
                const milestones = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                });
                const existing = milestones.data.find(m => m.title === 'v1.0.0');
                if (existing) {
                  milestoneNumber = existing.number;
                } else {
                  const created = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 release milestone'
                  });
                  milestoneNumber = created.data.number;
                }
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  milestone: milestoneNumber
                });
                console.log(`Set milestone v1.0.0 for issue #${context.payload.issue.number}`);
              } catch (e) {
                console.log(`Error setting milestone: ${e.message}`);
              }
            }

      - name: Update status label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'needs-triage'
              });
            } catch (e) {
              console.log(`Could not remove needs-triage label: ${e.message}`);
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['needs-review']
            });
            console.log('Updated status: needs-triage -> needs-review');
